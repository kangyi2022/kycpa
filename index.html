            white-space: nowrap;
        }

        }

        .subject-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: flex-end;
        }

            color: white;
            padding: 0.3rem 0.7rem;

            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;

        @media (min-width: 640px) {

        }

            gap: 1.2rem;

                flex-shrink: 0;
                position: sticky;
                top: 85px;

                padding: 1.5rem 1rem;

            background: #fafcfe;
            border: 1px solid #e9edf2;

            background: #fff0db;
            color: #c4450c;
            border-color: #ffd9a5;

            background: white;
            border-radius: 32px;

            border-radius: 60px;

            align-items: center;
            gap: 6px;
        }

        .download-md-btn:hover {
            background: #ffb347;
            color: #1e2a3a;
        }

            overflow-x: auto;

            font-size: 1.6rem;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
        }

            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            color: #165a72;

            font-size: 1.2rem;

            border-left: 4px solid #2c8cbb;
            padding-left: 12px;
            color: #1c5a7a;

            margin: 1rem 0;
            border-radius: 16px;
            font-size: 0.95rem;

            margin: 1rem 0;
            font-size: 0.85rem;
            background: #fff;
            border-radius: 16px;
            overflow-x: auto;
            display: block;

            .note-content table {
                display: table;

        .note-content th {
            background: #e0eff7;

            border-left: 6px solid #e6a017;
            padding: 0.9rem 1.2rem;
            margin: 1.2rem 0;
            border-radius: 20px;
        }

        .note-content .case-title {
            font-weight: 800;
            color: #b65f00;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .note-content .highlight {
            background: #eef4fc;
            padding: 0 3px;
            border-radius: 8px;
            color: #0056a7;
            font-weight: 500;
        }

        .note-content .risk-section {
            margin-bottom: 1.2rem;
        }

        .note-content .grid-2 {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 0.8rem 0;
        }

        .note-content .card {
            background: #ffffff;
            border: 1px solid #e2eaf0;
            border-radius: 20px;
            padding: 0.7rem 1rem;
            flex: 1 1 200px;
            font-size: 0.9rem;
        }

        .footer-note {
            background: #ecfdf5;
            padding: 0.9rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            font-size: 0.85rem;

            font-family: monospace;
            border: 1px solid #dce5eb;
            margin: 0.8rem 0;
            overflow-x: auto;
            font-size: 0.9rem;
        }

            padding-left: 1.3rem;
            margin: 0.6rem 0;
        }

        @media (max-width: 640px) {
            .note-content {
                font-size: 0.92rem;
            }
            .chapter-nav a {
                text-align: center;
                font-size: 0.8rem;
                padding: 0.45rem 0.7rem;
            }
            .subject-tabs {
                flex: 1;
                justify-content: center;
            }
            .cpa-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .logo {
                text-align: center;
            }
        }
    </style>
</head>

<script>

    const strategyChapter2 = `

        <tr><td>💰 经济</td><td>GDP/通胀/利率/汇率、经济体制、宏观经济政策、工资水平等。</td></tr>

        </tbody></table>
        <div class="case-block"><div class="case-title">📖 【案例2.1】WS公司滤水壶业务决策——PEST分析</div><p>我国水质标准提升，居民健康需求上升，德国B滤水壶拥有专利技术 → WS签订代理协议。<span class="highlight">政治/经济/社会/技术</span>四维度联动，发现市场机会。</p></div>

        <div class="case-block"><div class="case-title">📖 调味品产业五力案例</div><p>海外企业进入威胁 + 综合调味品替代 + 原辅料成本上涨 + 生产企业众多 → 差异化/成本领先战略对抗五力。</p></div>

        <h2>⚖️ 三、SWOT分析</h2>
        <div class="theory-box">SO增长型、WO扭转型、ST多种经营、WT防御型。结合内外部因素联动制定战略。</div>

    const strategyChapter8 = `
        <h1 style="font-size:1.7rem; border-left: 6px solid #ffb347; padding-left: 1rem;">⚠️ 第八章 主要风险与应对</h1>
        <div class="risk-section"><h2>一、战略风险</h2><p>制定/实施/调整/复盘整改风险。案例：文天公司盲目多元化导致主业失利，应对：聚焦主业+品牌焕新。</p></div>

        <div class="risk-section"><h2>四、运营风险（13类）</h2><p>组织架构、采购、销售、研发、合同等。广尚科技公司: 采购标准化+信用管控降低损失。</p></div>

    `;
    
    const financeChapter4 = `
        <h1 style="font-size:1.7rem; border-left:6px solid #2b6e9e; padding-left:1rem;">📈 第四章 资本成本</h1>
        <div class="theory-box"><strong>资本成本</strong>：机会成本，用于投资/筹资决策。核心：债务成本、权益成本、WACC。</div>
        <h2>💰 债务资本成本</h2>
        <p>方法：到期收益率法、可比公司法、风险调整法。税后债务成本 = 税前×(1-T)。</p>
        <div class="formula-card">债券估值公式: P₀ = ∑利息/(1+r_d)ⁿ + 本金/(1+r_d)ⁿ，内插法求r_d。</div>
        <h2>📈 普通股资本成本</h2>
        <p><strong>CAPM</strong>：r_s = r_RF + β×(r_m - r_RF)<br><strong>股利增长模型</strong>：r_s = D₁/P₀ + g</p>
        <div class="case-block"><div class="case-title">📘 经典计算</div><p>股价50元，D₁=2元，g=6%，则r_s=2/50+6%=10%。</p></div>

        <div class="formula-card">WACC = (债务权重×税后债务成本) + (优先股成本×优先股权重) + (权益权重×权益成本)</div>
        <div class="footer-note">🔥 高频考点：债务/权益成本计算 + WACC综合，注意权重选用目标资本结构。</div>
    `;

    const accountingNote = `

        <h2>企业所得税</h2><p>税前扣除原则、不征税/免税收入、加速折旧、高新企业优惠15%、研发费用加计扣除。</p>
        <h2>个人所得税</h2><p>综合所得汇算清缴，专项附加扣除标准，年终奖单独计税与合并计税选择。</p>
        <div class="case-block"><div class="case-title">✨ 企税视同销售调整</div><p>自产产品用于职工福利，增值税视同销售，企业所得税确认收入并调增。</p></div>
        <div class="footer-note">🌾 跨章节综合题高频：增值税+企业所得税结合发票合规性。</div>
    `;
    
    const auditNote = `
        <h1 style="font-size:1.7rem;">🔍 审计·风险评估+实质性程序+报告</h1>
        <div class="theory-box"><strong>审计重要性</strong>：整体重要性，实际执行的重要性，明显微小错报临界值。<br>
        <strong>函证</strong>：银行存款/应收账款函证决策，积极式/消极式函证，函证控制。<br>
        <strong>存货监盘</strong>：监盘计划制定，特殊类型存货监盘方法。<br>
        <strong>审计报告</strong>：关键审计事项，非无保留意见类型（保留/否定/无法表示意见）。</div>
        <div class="case-block"><div class="case-title">📘 简答思路</div><p>应对舞弊风险：识别、评估、应对三环节，强调职业怀疑，增加不可预见性程序。</p></div>
        <div class="footer-note">💡 综合题热点：集团审计、关联方审计、持续经营假设适当性。</div>
    `;
    
    // 科目数据结构
    const subjectData = {
        strategy: {
            name: "公司战略与风险管理",
            chapters: [
                { id: "ch2", title: "第二章 战略分析", content: strategyChapter2 },
                { id: "ch8", title: "第八章 主要风险与应对", content: strategyChapter8 }
            ]
        },
        finance: {
            name: "财务成本管理",
            chapters: [
                { id: "ch4", title: "第四章 资本成本", content: financeChapter4 }
            ]
        },
        accounting: {
            name: "会计",
            chapters: [
                { id: "acc_main", title: "长投·收入·金融资产", content: accountingNote }
            ]
        },
        economic: {
            name: "经济法",
            chapters: [
                { id: "eco_main", title: "物权·合同·公司·证券", content: economicNote }
            ]
        },
        tax: {
            name: "税法",
            chapters: [
                { id: "tax_main", title: "增值税·企税·个税核心", content: taxNote }
            ]
        },
        audit: {
            name: "审计",
            chapters: [
                { id: "audit_main", title: "风险评估·函证·报告", content: auditNote }
            ]
        }
    };
    
    let currentSubject = "strategy";
    let currentChapterId = null;
    
    function renderSidebar() {
        const data = subjectData[currentSubject];
        if (!data) return;
        const sidebarTitle = document.getElementById("sidebarTitle");
        sidebarTitle.innerText = `📖 ${data.name} · 章节`;
        const chapterList = document.getElementById("chapterList");
        chapterList.innerHTML = "";
        data.chapters.forEach(ch => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = "javascript:void(0)";
            a.innerText = ch.title;
            a.addEventListener("click", (e) => {
                document.querySelectorAll("#chapterList a").forEach(link => link.style.background = "");
                a.style.background = "#fff0db";
                a.style.borderColor = "#ffb347";
                currentChapterId = ch.id;
                displayNoteContent(ch.content);
            });
            li.appendChild(a);
            chapterList.appendChild(li);
        });
        // 默认选中第一个章节
        if (data.chapters.length > 0 && !currentChapterId) {
            currentChapterId = data.chapters[0].id;
            displayNoteContent(data.chapters[0].content);
            const firstLink = chapterList.querySelector("a");
            if (firstLink) {
                firstLink.style.background = "#fff0db";
                firstLink.style.borderColor = "#ffb347";
            }
        } else if (currentChapterId) {
            const matched = data.chapters.find(c => c.id === currentChapterId);
            if (matched) displayNoteContent(matched.content);
            else if (data.chapters[0]) displayNoteContent(data.chapters[0].content);
        }
    }
    
    function displayNoteContent(htmlContent) {
        const container = document.getElementById("noteContainer");
        container.innerHTML = htmlContent;
    }
    
    function downloadCurrentNote() {
        const data = subjectData[currentSubject];
        if (!data) return;
        const activeChapter = data.chapters.find(c => c.id === currentChapterId);
        if (!activeChapter) return;
        let subjectName = "";
        switch(currentSubject) {
            case "strategy": subjectName = "公司战略与风险管理"; break;
            case "finance": subjectName = "财务成本管理"; break;
            case "accounting": subjectName = "会计"; break;
            case "economic": subjectName = "经济法"; break;
            case "tax": subjectName = "税法"; break;
            case "audit": subjectName = "审计"; break;
            default: subjectName = currentSubject;
        }
        let mdContent = `# ${subjectName} 复习笔记\n\n`;
        mdContent += `## ${activeChapter.title}\n\n`;
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = activeChapter.content;
        let textContent = tempDiv.innerText || tempDiv.textContent;
        textContent = textContent.substring(0, 5000) + "\n\n—— 出自CPA复习导航站，更多知识点请访问网页端完整笔记。";
        mdContent += textContent;
        const blob = new Blob([mdContent], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentSubject}_${activeChapter.title.replace(/[\/\\:*?"<>|]/g, '')}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    function switchSubject(subjectId) {
        currentSubject = subjectId;
        currentChapterId = null;
        renderSidebar();
        document.querySelectorAll(".subject-btn").forEach(btn => {
            if (btn.getAttribute("data-subject") === subjectId) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }
    
    document.querySelectorAll(".subject-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const sub = btn.getAttribute("data-subject");
            switchSubject(sub);
        });
    });
    
    document.getElementById("downloadCurrentMd").addEventListener("click", downloadCurrentNote);
    switchSubject("strategy");
</script>
</body>
</html>
