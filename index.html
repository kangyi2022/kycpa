    `;
    
    const financeChapter4 = `
        <h1 style="font-size:1.8rem; border-left:6px solid #2b6e9e; padding-left:1rem;">📈 第四章 资本成本 · 第一轮知识点梳理</h1>
        <div style="color:#3e6b8c; margin-bottom:1rem;">CPA《财务成本管理》教材 (2026) | 核心：债务成本、权益成本、WACC</div>
        <h2>📌 一、资本成本概述</h2>
        <div class="theory-box"><p>资本成本是投资资本的机会成本（取舍率），包含公司资本成本和项目资本成本。应用：投资决策、筹资决策、营运资本管理、业绩评价。</p></div>
        <h2>💰 二、债务资本成本估计 ★★★</h2>
        <p><strong>方法</strong>：到期收益率法、可比公司法、风险调整法、财务比率法。税后债务成本 = 税前×(1-税率)。</p>
        <div class="formula-card" style="background:#f8fafc; padding:12px; border-radius:16px;">公式：P<sub>0</sub>=∑利息/(1+r<sub>d</sub>)ⁿ + 本金/(1+r<sub>d</sub>)ⁿ，内插法求r<sub>d</sub></div>
        <h2>📈 三、普通股资本成本估计 ★★★</h2>
        <p><strong>CAPM模型</strong>：r<sub>s</sub> = r<sub>RF</sub> + β×(r<sub>m</sub>-r<sub>RF</sub>)；<strong>股利增长模型</strong>：r<sub>s</sub> = D<sub>1</sub>/P<sub>0</sub> + g；<strong>债券收益率风险调整模型</strong>：r<sub>s</sub> = 税后债务成本 + 风险溢价。</p>
        <div class="case-block"><div class="case-title">📘 股利增长模型案例</div><p>某公司当前股价50元，预计下期股利2元，股利增长率6%，则r<sub>s</sub>=2/50+6%=10%。</p></div>
        <h2>🔄 四、混合筹资资本成本（优先股&永续债）</h2>
        <p>优先股r<sub>p</sub>=D<sub>p</sub>/[P<sub>p</sub>(1-F)]；永续债类似，注意税务处理（金融负债利息可抵税）。</p>
        <h2>⚙️ 五、加权平均资本成本 (WACC)</h2>
        <div class="formula-card">WACC = Σ (税后债务成本×债务权重) + (优先股成本×优先股权重) + (普通股成本×权益权重)</div>
        <p>权重选择：账面价值、市场价值、目标资本结构。决策原则：项目风险与公司一致时使用WACC。</p>
        <div class="footer-note">🔥 高频计算：债务税前成本估计+CAPM+股利增长模型+WACC综合。易错提示：注意债务成本为税后，混合筹资税务影响。</div>
    `;
    
    // 其他科目暂时友好提示（会计、经济法、税法、审计暂无详细笔记，展示占位说明）
    const placeholder = `<div style="padding:2rem; text-align:center; background:#fef9e8; border-radius:28px;"><h3>📘 待补充笔记</h3><p>该科目章节笔记正在整理中，后续会按CPA教材补充详细知识点、案例与习题。<br>当前支持 <strong>战略（第2章&第8章）</strong> 及 <strong>财管（第4章 资本成本）</strong> 完整笔记。</p><p>✨ 您可根据需要继续上传其他笔记文件，更新此复习平台。</p></div>`;
    
    // 章节映射表 (科目 => 章节列表 + 内容映射)
    const subjectData = {
        strategy: {
            name: "公司战略与风险管理",
            chapters: [
                { id: "ch2", title: "第二章 战略分析", content: strategyChapter2 },
                { id: "ch8", title: "第八章 主要风险与应对", content: strategyChapter8 }
            ]
        },
        finance: {
            name: "财务成本管理",
            chapters: [
                { id: "ch4", title: "第四章 资本成本", content: financeChapter4 }
            ]
        },
        accounting: {
            name: "会计",
            chapters: [
                { id: "acc_placeholder", title: "会计笔记（待补充）", content: placeholder }
            ]
        },
        economic: {
            name: "经济法",
            chapters: [
                { id: "eco_placeholder", title: "经济法笔记（待补充）", content: placeholder }
            ]
        },
        tax: {
            name: "税法",
            chapters: [
                { id: "tax_placeholder", title: "税法笔记（待补充）", content: placeholder }
            ]
        },
        audit: {
            name: "审计",
            chapters: [
                { id: "audit_placeholder", title: "审计笔记（待补充）", content: placeholder }
            ]
        }
    };
    
    let currentSubject = "strategy";
    let currentChapterId = null;
    
    // 渲染左侧章节栏
    function renderSidebar() {
        const data = subjectData[currentSubject];
        if(!data) return;
        const sidebarTitle = document.getElementById("sidebarTitle");
        sidebarTitle.innerText = `📖 ${data.name} · 章节`;
        const chapterList = document.getElementById("chapterList");
        chapterList.innerHTML = "";
        data.chapters.forEach(ch => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = "javascript:void(0)";
            a.innerText = ch.title;
            a.addEventListener("click", () => {
                document.querySelectorAll("#chapterList a").forEach(link => link.style.background = "");
                a.style.background = "#fff0db";
                currentChapterId = ch.id;
                displayNoteContent(ch.content);
            });
            li.appendChild(a);
            chapterList.appendChild(li);
        });
        // 默认选择第一个章节
        if(data.chapters.length > 0 && !currentChapterId) {
            currentChapterId = data.chapters[0].id;
            displayNoteContent(data.chapters[0].content);
            const firstLink = chapterList.querySelector("a");
            if(firstLink) firstLink.style.background = "#fff0db";
        } else if(currentChapterId) {
            const matched = data.chapters.find(c => c.id === currentChapterId);
            if(matched) displayNoteContent(matched.content);
            else if(data.chapters[0]) displayNoteContent(data.chapters[0].content);
        }
    }
    
    function displayNoteContent(htmlContent) {
        const container = document.getElementById("noteContainer");
        container.innerHTML = htmlContent;
        // 重新绑定内嵌的可能脚本（但本身无脚本，安全）
    }
    
    // 下载当前笔记（生成动态Markdown简易版）
    function downloadCurrentNote() {
        const data = subjectData[currentSubject];
        if(!data) return;
        const activeChapter = data.chapters.find(c => c.id === currentChapterId);
        if(!activeChapter) return;
        let mdContent = `# ${currentSubject === 'strategy' ? '战略' : currentSubject === 'finance' ? '财管' : currentSubject} 笔记\n\n`;
        mdContent += `## ${activeChapter.title}\n\n`;
        // 提取纯文本简易版本 (去除html标签，简化)
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = activeChapter.content;
        let textContent = tempDiv.innerText || tempDiv.textContent;
        textContent = textContent.substring(0, 3000) + "\n\n... 完整笔记请查看网页版。";
        mdContent += textContent;
        const blob = new Blob([mdContent], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentSubject}_${activeChapter.title.replace(/[\/\\:*?"<>|]/g, '')}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    // 科目切换事件
    function switchSubject(subjectId) {
        currentSubject = subjectId;
        currentChapterId = null;
        renderSidebar();
        // 高亮科目按钮
        document.querySelectorAll(".subject-btn").forEach(btn => {
            if(btn.getAttribute("data-subject") === subjectId) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }
    
    // 绑定科目按钮事件
    document.querySelectorAll(".subject-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            const sub = btn.getAttribute("data-subject");
            switchSubject(sub);
        });
    });
    
    // 下载按钮
    document.getElementById("downloadCurrentMd").addEventListener("click", downloadCurrentNote);
    
    // 初始化默认战略
    switchSubject("strategy");
</script>
</body>
</html>
